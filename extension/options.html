<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Aionda Browser MCP Options</title>
    <style>
      body {
        color: #202124;
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 32px;
        max-width: 680px;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 18px 0 6px;
      }

      input {
        border: 1px solid #dadce0;
        border-radius: 6px;
        box-sizing: border-box;
        font: inherit;
        padding: 10px 12px;
        width: 100%;
      }

      button {
        background: #1a73e8;
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        margin-top: 18px;
        padding: 10px 16px;
      }

      #status {
        color: #137333;
        margin-left: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Aionda Browser MCP</h1>
    <p>Configure the local relay endpoint used by the extension.</p>

    <label for="host">Host</label>
    <input id="host" autocomplete="off">

    <label for="port">Port</label>
    <input id="port" inputmode="numeric" autocomplete="off">

    <label for="token">Gateway token</label>
    <input id="token" autocomplete="off">

    <button id="save">Save</button>
    <span id="status"></span>

    <script src="options.js"></script>
  </body>
</html>
